<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#fff1eb,#ace0f9,#fbc2eb);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(10px);
    padding:50px;
    border-radius:30px;
    text-align:center;
    width:80%;
    max-width:700px;
    box-shadow:0 10px 35px rgba(0,0,0,0.15);
    animation:fadeIn 2s ease;
}

h1{
    font-size:55px;
    color:#ff4d6d;
    text-shadow:0 0 15px rgba(255,77,109,0.4);
    margin-bottom:20px;
}

p{
    font-size:22px;
    color:#444;
    line-height:1.8;
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff758c,#ff7eb3);
    color:white;
    cursor:pointer;
    transition:0.4s;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(255,118,136,0.4);
}

button:hover{
    transform:scale(1.08);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🌙 Eid-ul-Adha Mubarak 🐐</h1>

    <p>
        May this Eid bring happiness, success, peace, endless blessings And Barakah
        into your life. Enjoy every beautiful moment with your loved ones ✨
    </p>

    <button onclick="showWish()">Open Wish 🎁</button>
</div>

<script>
function showWish(){
    alert("✨ Wishing You & Your Family a Wonderful Bakra Eid ✨");
}
</script>

</body>
</html>
