<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>

body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#fff1eb,#ace0f9,#fbc2eb);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* main card */

.container{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(10px);
    padding:50px;
    border-radius:30px;
    text-align:center;
    width:80%;
    max-width:700px;
    box-shadow:0 10px 35px rgba(0,0,0,0.15);
    animation:fadeIn 2s ease;
}

h1{
    font-size:55px;
    color:#ff4d6d;
    text-shadow:0 0 15px rgba(255,77,109,0.4);
    margin-bottom:20px;
}

p{
    font-size:22px;
    color:#444;
    line-height:1.8;
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff758c,#ff7eb3);
    color:white;
    cursor:pointer;
    transition:0.4s;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(255,118,136,0.4);
}

button:hover{
    transform:scale(1.08);
}

/* custom popup */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box{
    width:80%;
    max-width:350px;
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    animation:pop 0.4s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.popup-box h2{
    color:#ff4d6d;
    margin-bottom:15px;
}

.popup-box p{
    color:#444;
    line-height:1.7;
    font-size:18px;
}

.popup-box button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    font-size:16px;
}

@keyframes pop{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>🌙 Eid-ul-Adha Mubarak 🐐</h1>

    <p>
        May this Eid bring happiness, success, peace, and endless blessings
        into your life. Enjoy every beautiful moment with your loved ones ✨
    </p>

    <button onclick="showWish()">Open Wish 🎁</button>

</div>

<!-- popup -->

<div id="popup" class="popup">

    <div class="popup-box">

        <h2>✨ Eid Mubarak ✨</h2>

        <p>
            Wishing You & Your Family a Wonderful Eid-ul-Adha 🌙
        </p>

        <button onclick="closePopup()">Close</button>

    </div>

</div>

<script>

function showWish(){
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
