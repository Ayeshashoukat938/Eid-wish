<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
    animation:fadeIn 2s ease;
}

h1{
    font-size:55px;
    color:#ffd700;
    text-shadow:0 0 20px #ffd700;
    animation:glow 2s infinite alternate;
}

p{
    font-size:22px;
    width:80%;
    margin:auto;
    line-height:1.8;
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:#ffd700;
    color:black;
    cursor:pointer;
    transition:0.4s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #ffd700;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #ffd700; }
    to{ text-shadow:0 0 30px #fff700; }
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🌙 Eid-ul-Adha Mubarak 🐐</h1>

    <p>
        May Allah fill your life with happiness, peace, and countless blessings.
        Enjoy this beautiful Eid with your family and loved ones. ✨
    </p>

    <button onclick="showWish()">Click for Surprise 🎁</button>
</div>

<script>
function showWish(){
    alert("✨ Wishing You & Your Family a Very Happy Bakra Eid ✨");
}
</script>

</body>
</html>
